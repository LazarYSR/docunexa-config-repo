server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    config:
      fail-fast: true

    consul:
      host: localhost
      port: 8500
      discovery:
        enabled: true
        register: true

    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_SERVER_URL}/realms/${KEYCLOAK_REALM}

management:
  endpoints:
    web:
      exposure:
        include: "*"