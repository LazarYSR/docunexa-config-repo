server:
  port: 8080
  address: 127.0.0.1

spring:
  application:
    name: gateway-service
  cloud:
    config:
      fail-fast: false
    consul:
      host: localhost
      port: 8500
      discovery:
        health-check-path: /actuator/health
        health-check-interval: 15s
        health-check-timeout: 10s     
        enabled: true
        register: true
        instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
        prefer-ip-address: true
        hostname: localhost
        prefer-ip-address: false
        port: ${server.port:8080}
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${keycloak.server-url:http://localhost:9090}/realms/${keycloak.realm:docunexa}

management:
  endpoints:
    web:
      exposure:
        include: "*"