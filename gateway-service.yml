server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: "vault://" 
  cloud:
    config:
      fail-fast: false
    vault:
      uri: http://localhost:8201
      token: ${VAULT_TOKEN:myroot}
      authentication: TOKEN
      kv:
        enabled: true
        backend: secret
        default-context: ${spring.application.name}
        profile-separator: '/'
    consul:
      host: localhost
      port: 8500
      discovery:
        health-check-path: /actuator/health
        health-check-interval: 10s
        enabled: true
        register: true

    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_SERVER_URL}/realms/${KEYCLOAK_REALM}
logging:
  level:
    org.springframework.vault: DEBUG
    org.springframework.cloud.vault: DEBUG
management:
  endpoints:
    web:
      exposure:
        include: "*"