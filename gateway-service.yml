server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    config:
      fail-fast: true

    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8082
          predicates:
            - Path=/auth/**

        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/users/**

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_SERVER_URL}/realms/${KEYCLOAK_REALM}

management:
  endpoints:
    web:
      exposure:
        include: "*"