server:
  port: 8080

spring:
  application:
    name: gateway-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/docunexa

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8082
          predicates:
            - name: Path
              args:
                pattern: /auth/**
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/users/**
management:
  endpoints:
    web:
      exposure:
        include: "*"