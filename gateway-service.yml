server:
  port: 8080

spring:
  application:
    name: gateway-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/docunexa

  cloud:
    gateway:
      routes:
        - id: test-route
          uri: https://httpbin.org
          predicates:
            - name: Path
              args:
                pattern: /test/**
          filters:
            - StripPrefix=1
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - name: Path
              args:
                pattern: /users/**      
management:
  endpoints:
    web:
      exposure:
        include: "*"