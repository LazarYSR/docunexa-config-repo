server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        health-check-path: /actuator/health
        health-check-interval: 10s
        enabled: true
        register: true
    vault:
      uri: http://localhost:8201
      token: myroot
      authentication: TOKEN
      kv:
        enabled: true
        backend: secret
        default-context: gateway-service
        profile-separator: '/'
    config:
      fail-fast: false
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${keycloak.server-url:http://localhost:9090}/realms/${keycloak.realm:docunexa}

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    org.springframework.vault: DEBUG
    org.springframework.cloud.vault: DEBUG