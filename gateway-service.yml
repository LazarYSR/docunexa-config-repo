server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    config:
      fail-fast: false
    consul:
      host: localhost
      port: 8500
      discovery:
        # Health check
        health-check-path: /actuator/health
        health-check-interval: 15s
        health-check-timeout: 10s
        health-check-critical-timeout: 1m
        
        # Registration
        enabled: true
        register: true
        prefer-ip-address: true
        ip-address: 127.0.0.1
        port: 8080  
        instance-id: ${spring.application.name}:${server.port}
        
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${keycloak.server-url:http://localhost:9090}/realms/${keycloak.realm:docunexa}

management:
  endpoints:
    web:
      exposure:
        include: "*"