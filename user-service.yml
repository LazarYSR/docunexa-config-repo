server:
  port: 8081

spring:
  application:
    name: user-service
  main:
    allow-bean-definition-overriding: true  
  cloud:
    config:
      fail-fast: false
    consul:
      discovery:
        health-check-path: /actuator/health
        health-check-interval: 15s
        enabled: true
        register: true
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
          default-key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
          default-value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
          auto-create-topics: true
      bindings:
        userEvents-in-0:
          destination: user-events
          group: user-service-group
          content-type: application/json
          consumer:
            max-attempts: 3
            back-off-initial-interval: 1000
            back-off-multiplier: 2.0
            back-off-max-interval: 10000

  datasource:
    url: ${database.url}
    username: ${database.username}
    password: ${database.password}
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${keycloak.server-url}/realms/${keycloak.realm}

kafka:
  topic:
    user-events: user-events

management:
  endpoints:
    web:
      exposure:
        include: "*"