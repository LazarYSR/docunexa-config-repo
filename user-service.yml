server:
  port: 8081

spring:
  application:
    name: user-service
  config:
    import:
      - "vault://secret/data/user-service/database?prefix=database"  # ← Import explicite
  datasource:
    # ✅ Mapping: Vault 'database.url' → Spring '${database.url}'
    url: ${database.url:jdbc:postgresql://localhost:5432/docunexa-db}
    username: ${database.username:postgres}
    password: ${database.password:}  # ⚠️ Pas de fallback en prod !
    driver-class-name: org.postgresql.Driver
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        health-check-path: /actuator/health
        health-check-interval: 10s
        enabled: true
        register: true
    vault:
      uri: http://localhost:8201
      token: ${VAULT_TOKEN:myroot}
      authentication: TOKEN
      kv:
        enabled: true
        backend: secret
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${keycloak.server-url:http://localhost:9090}/realms/${keycloak.realm:docunexa}

logging:
  level:
    org.springframework.vault: DEBUG
    org.springframework.cloud.vault: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"