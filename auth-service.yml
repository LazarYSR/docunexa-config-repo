server:
  port: 8082

spring:
  application:
    name: auth-service
  cloud:
    config:
      fail-fast: false
    consul:
      discovery:
        health-check-path: /actuator/health
        health-check-interval: 15s
        enabled: true
        register: true
  keycloak:
    server-url: ${keycloak.server-url:http://localhost:9090}
    realm: ${keycloak.realm:docunexa}
    client-id: ${keycloak.client-id:gateway-client}
    client-secret: ${keycloak.client-secret:}
    admin-client-id: ${keycloak.admin-client-id:admin-cli}
    admin-username: ${keycloak.admin-username:admin}
    admin-password: ${keycloak.admin-password:admin}
  app:
    redirect-uri: http://localhost:8080
  user-service:
    url: http://localhost:8081

management:
  endpoints:
    web:
      exposure:
        include: "*"